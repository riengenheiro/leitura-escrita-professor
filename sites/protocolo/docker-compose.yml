services:
  # Serviço de desenvolvimento com hot-reload
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sales-page-dev
    ports:
      - "5173:5173"  # Porta padrão do Vite
      - "3000:3000"  # Porta alternativa para CRA
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
    networks:
      - sales-network
    profiles:
      - dev

  # Serviço de produção otimizado
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sales-page-prod
    ports:
      - "8081:80"  # Porta interna 8081 para proxy reverso (8080 já usada pelo Proxy Manager)
    restart: unless-stopped
    networks:
      - sales-network
    profiles:
      - prod
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: manual-backend
    ports:
      - "3001:3001"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
    networks:
      - sales-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  sales-network:
    driver: bridge
