# Configuração Nginx para múltiplos sites
# Cada site tem seu server block apontando para seu dist/
# Nomes de servidor longos exigem bucket maior
server_names_hash_bucket_size 128;

# Site 1: Protocolo Energia Total — protocolo.vivasuamissao.top (React: landing + /login + /manual)
server {
    listen 80 default_server;
    server_name protocolo.vivasuamissao.top;
    root /var/www/protocolo/dist;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Backend: login + webhook Kiwify
    location /api {
        proxy_pass http://manual-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /webhook {
        proxy_pass http://manual-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # index.html sem cache (SPA)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Assets estáticos (Vite: /assets/, /images/, favicon)
    location ~* \.(js|css|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA: todas as rotas (/, /login, /manual) caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log off;
        return 200 "protocolo ok\n";
        add_header Content-Type text/plain;
    }
}

